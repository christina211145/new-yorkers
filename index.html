<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="New Yorkers">
<title>The New Yorkers</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, setDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6p-nj7cTyXHwBciocO842BSM8TWvg4lM",
  authDomain: "new-yorkers.firebaseapp.com",
  projectId: "new-yorkers",
  storageBucket: "new-yorkers.firebasestorage.app",
  messagingSenderId: "923049140533",
  appId: "1:923049140533:web:91ab1bf53c32c678c86c7c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, 'properties');

window._fbReady = false;
window._pendingSnapshot = null;

window._fbSave = async (prop) => {
  const {id, ...data} = prop;
  await setDoc(doc(db, 'properties', id), data);
};
window._fbDelete = async (id) => {
  await deleteDoc(doc(db, 'properties', id));
};

onSnapshot(colRef, (snapshot) => {
  const data = [];
  snapshot.forEach(d => data.push({id: d.id, ...d.data(), photos: d.data().photos||[]}));
  if(window._mapReady){
    window._applySnapshot(data);
  } else {
    window._pendingSnapshot = data;
  }
}, (err) => {
  console.error('Firestore error:', err);
  window._setSyncStatus('error');
});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surface:#1a1d26;--surface2:#22263a;--surface3:#2a2f45;
  --border:#2e3350;--border2:#3a4060;--text:#f0f2ff;--text2:#9ba3c8;--text3:#6370a0;
  --accent:#4f7cff;--accent2:#3d63d4;--red:#e05252;--radius:10px;--radius-lg:16px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:10px 12px;padding-top:calc(env(safe-area-inset-top) + 10px);gap:8px;flex-shrink:0;z-index:1000}
.logo{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
.search-wrap{flex:1;position:relative;min-width:0}
.search-wrap input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:22px;padding:10px 34px 10px 16px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;caret-color:var(--accent)}
.search-wrap input:focus{border-color:var(--accent);background:var(--surface3)}
.search-wrap input::placeholder{color:var(--text3);font-size:15px}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;display:none;line-height:1}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:14px;overflow:hidden;z-index:9999;max-height:260px;overflow-y:auto;display:none;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.sr-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.sr-item:active{background:#f0f4ff}
.sr-icon{font-size:16px;flex-shrink:0}
.sr-name{font-size:14px;color:#202124;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:12px;color:#70757a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.topbar-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;z-index:1}
.leaflet-container{background:#e8e0d8}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);min-height:calc(56px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;padding:8px 4px}
.nav-btn.active{color:var(--accent)}
.nav-btn .nav-ico{font-size:22px}

/* PANELS */
.panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:800;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:88vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.panel.open{transform:translateY(0)}
.panel-handle{width:40px;height:5px;background:var(--border2);border-radius:3px;margin:12px auto 0}
.panel-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:16px;font-weight:700;color:var(--text)}
.panel-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);font-size:16px;cursor:pointer}
.panel-body{overflow-y:auto;flex:1;padding:14px;-webkit-overflow-scrolling:touch}

/* SYNC INDICATOR */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:#f5a623;animation:pulse 1s infinite}
.sync-dot.synced{background:#2eb87a}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LIST */
.prop-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer}
.prop-card:active{opacity:.8}
.prop-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.prop-addr{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.status-badge{font-size:10px;padding:3px 7px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap}
.s0{background:rgba(79,124,255,.15);color:#7aa3ff}
.s1{background:rgba(46,184,122,.15);color:#3dd68c}
.s2{background:rgba(224,82,82,.15);color:#e07070}
.s3{background:rgba(234,179,8,.15);color:#ca9d00}
.prop-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.meta-i{font-size:11px;color:var(--text3)}
.meta-v{color:var(--text2);font-weight:500}
.prop-price{font-size:15px;font-weight:700;color:var(--accent);margin-top:4px}
.prop-thumbs{display:flex;gap:4px;margin-top:8px}
.prop-thumbs img{width:44px;height:34px;object-fit:cover;border-radius:5px;border:1px solid var(--border)}
.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px;line-height:1.8}
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:16px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* FILTERS */
.f-row{display:flex;gap:8px;margin-bottom:10px}
.f-group{flex:1}
.f-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.f-group select,.f-group input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.f-group select option{background:var(--surface)}
.range-row{display:flex;gap:6px;align-items:center}
.range-sep{color:var(--text3);font-size:12px}

/* FORM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:93vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:17px;font-weight:700;color:var(--text)}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);font-size:17px;cursor:pointer}
.modal-body{padding:16px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 13px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;font-family:inherit;caret-color:var(--accent)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);background:var(--surface3)}
.fg select option{background:var(--surface)}
.fg textarea{resize:none;height:80px;line-height:1.5}
.status-opts{display:flex;gap:8px;flex-wrap:wrap}
.sopt{flex:1;min-width:calc(50% - 4px);padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3)}
.sopt.sel0{border-color:#4f7cff;background:rgba(79,124,255,.15);color:#7aa3ff}
.sopt.sel1{border-color:#2eb87a;background:rgba(46,184,122,.15);color:#3dd68c}
.sopt.sel2{border-color:#e05252;background:rgba(224,82,82,.15);color:#e07070}
.sopt.sel3{border-color:#ca9d00;background:rgba(234,179,8,.15);color:#ca9d00}
.photo-area{border:1.5px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;color:var(--text3);font-size:14px;cursor:pointer}
.photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-prev{position:relative;width:68px;height:54px}
.photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--red);border-radius:50%;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;flex:1}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn:active{opacity:.75}

/* VIEW */
.view-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.view-info-item{background:var(--surface2);border-radius:8px;padding:10px}
.view-info-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.view-info-val{font-size:14px;font-weight:600;color:var(--text)}
.view-price{font-size:26px;font-weight:800;color:var(--accent);margin-bottom:12px}
.view-notes{background:var(--surface2);border-radius:8px;padding:12px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.gallery{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.gallery img{height:72px;width:auto;border-radius:8px;object-fit:cover;cursor:pointer}
.view-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:99999;display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:96vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-close{position:fixed;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* LEGEND */
.legend{position:absolute;left:10px;bottom:10px;z-index:500;background:#fff;border-radius:8px;padding:8px 10px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.legend-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;color:#444;font-weight:500}
.legend-row:last-child{margin:0}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAP CONTROLS */
.map-controls{position:absolute;right:10px;bottom:10px;z-index:500;display:flex;flex-direction:column;gap:6px}
.map-ctrl-btn{width:36px;height:36px;background:#fff;border:none;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;color:var(--text);z-index:99999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Leaflet */
.leaflet-popup-content-wrapper{background:#fff!important;border:none!important;border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,.18)!important;font-family:-apple-system,sans-serif!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:13px!important;color:#202124!important}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,.15)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:#fff!important;color:#333!important;border-bottom:1px solid #eee!important}
.leaflet-control-attribution{font-size:9px!important;background:rgba(255,255,255,.7)!important}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">🏙 NY</div>
    <div class="search-wrap">
      <input id="addr-search" type="text" placeholder="Αναζήτηση διεύθυνσης...">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      <div id="search-results"></div>
    </div>
    <div class="sync-dot" id="sync-dot" title="Σύνδεση"></div>
    <button class="topbar-btn" onclick="openAddModal()">+</button>
  </div>

  <!-- MAP -->
  <div class="main">
    <div id="map"></div>
    <div class="map-controls">
      <button class="map-ctrl-btn" onclick="locateMe()">📍</button>
    </div>
    <div class="legend">
      <div class="legend-row"><div class="ldot" style="background:#4f7cff"></div>Υπό Εξέταση</div>
      <div class="legend-row"><div class="ldot" style="background:#2eb87a"></div>Ενδιαφέρον</div>
      <div class="legend-row"><div class="ldot" style="background:#e05252"></div>Απορρίφθηκε</div>
      <div class="legend-row"><div class="ldot" style="background:#ca9d00"></div>Πουλήθηκε</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-map" onclick="showNav('map')">
      <span class="nav-ico">🗺</span>Χάρτης
    </button>
    <button class="nav-btn" id="nav-list" onclick="showNav('list')">
      <span class="nav-ico">🏠</span>Ακίνητα
    </button>
    <button class="nav-btn" id="nav-filters" onclick="showNav('filters')">
      <span class="nav-ico">⚙️</span>Φίλτρα
    </button>
    <button class="nav-btn" id="nav-export" onclick="exportExcel()">
      <span class="nav-ico">📊</span>Export
    </button>
  </div>

  <!-- LIST PANEL -->
  <div class="panel" id="panel-list">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <div class="panel-title">Ακίνητα</div>
      <button class="panel-close" onclick="closePanel('list')">✕</button>
    </div>
    <div class="panel-body">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Σύνολο</div></div>
        <div class="stat-card"><div class="stat-val" id="s-avg-price">—</div><div class="stat-lbl">Μέση Τιμή</div></div>
        <div class="stat-card"><div class="stat-val" id="s-avg-sqm">—</div><div class="stat-lbl">Μέσο Τ.μ.</div></div>
      </div>
      <div id="props-list"></div>
    </div>
  </div>

  <!-- FILTERS PANEL -->
  <div class="panel" id="panel-filters">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <div class="panel-title">Φίλτρα</div>
      <button class="panel-close" onclick="closePanel('filters')">✕</button>
    </div>
    <div class="panel-body">
      <div class="f-row">
        <div class="f-group">
          <div class="f-label">Κατάσταση</div>
          <select id="f-status" onchange="applyFilters()">
            <option value="">Όλες</option>
            <option value="0">Υπό Εξέταση</option>
            <option value="1">Ενδιαφέρον</option>
            <option value="2">Απορρίφθηκε</option>
            <option value="3">Πουλήθηκε</option>
          </select>
        </div>
        <div class="f-group">
          <div class="f-label">Ασανσέρ</div>
          <select id="f-elevator" onchange="applyFilters()">
            <option value="">Όλα</option>
            <option value="ναι">Ναι</option>
            <option value="όχι">Όχι</option>
          </select>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group">
          <div class="f-label">Τύπος</div>
          <select id="f-type" onchange="applyFilters()">
            <option value="">Όλοι</option>
            <option value="μεσίτης">Μεσίτης</option>
            <option value="ιδιώτης">Ιδιώτης</option>
          </select>
        </div>
        <div class="f-group">
          <div class="f-label">Όροφος</div>
          <input id="f-floor" type="number" placeholder="π.χ. 2" onchange="applyFilters()">
        </div>
      </div>
      <div class="f-row">
        <div class="f-group">
          <div class="f-label">Τιμή (€)</div>
          <div class="range-row">
            <input id="f-price-min" type="number" placeholder="Από" onchange="applyFilters()" style="text-align:center">
            <span class="range-sep">—</span>
            <input id="f-price-max" type="number" placeholder="Έως" onchange="applyFilters()" style="text-align:center">
          </div>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group">
          <div class="f-label">Τ.μ.</div>
          <div class="range-row">
            <input id="f-sqm-min" type="number" placeholder="Από" onchange="applyFilters()" style="text-align:center">
            <span class="range-sep">—</span>
            <input id="f-sqm-max" type="number" placeholder="Έως" onchange="applyFilters()" style="text-align:center">
          </div>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group">
          <div class="f-label">Ταξινόμηση</div>
          <select id="f-sort" onchange="applyFilters()">
            <option value="date-desc">Νεότερο πρώτα</option>
            <option value="date-asc">Παλαιότερο πρώτα</option>
            <option value="price-asc">Τιμή (↑)</option>
            <option value="price-desc">Τιμή (↓)</option>
            <option value="sqm-asc">Τ.μ. (↑)</option>
            <option value="sqm-desc">Τ.μ. (↓)</option>
          </select>
        </div>
      </div>
      <button class="btn" style="width:100%;margin-top:4px" onclick="clearFilters()">✕ Καθαρισμός φίλτρων</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">Νέο Ακίνητο</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">

          <select id="f-elev"><option value="">—</option><option value="Ναι">Ναι</option><option value="Όχι">Όχι</option></select>
        </div>
        <div class="fg"><label>Μεσίτης/Ιδιώτης</label>
          <select id="f-owner"><option value="">—</option><option value="Μεσίτης">Μεσίτης</option><option value="Ιδιώτης">Ιδιώτης</option></select>
        </div>

          <div class="status-opts">
            <div class="sopt sel0" onclick="selectStatus(0)" id="s-opt-0">Υπό Εξέταση</div>
            <div class="sopt" onclick="selectStatus(1)" id="s-opt-1">Ενδιαφέρον</div>
            <div class="sopt" onclick="selectStatus(2)" id="s-opt-2">Απορρίφθηκε</div>
            <div class="sopt" onclick="selectStatus(3)" id="s-opt-3">Πουλήθηκε</div>
          </div>
        </div>
        <div class="fg full"><label>Σημειώσεις</label><textarea id="f-notes" placeholder="Σημειώσεις..."></textarea></div>
        <div class="fg full">
          <label>Φωτογραφίες</label>
          <div class="photo-area" onclick="document.getElementById('photo-input').click()">📷 Προσθήκη φωτογραφιών</div>
          <input type="file" id="photo-input" multiple accept="image/*" style="display:none" onchange="handlePhotos(event)">
          <div class="photo-previews" id="photo-preview"></div>
        </div>
        <div class="fg full"><label>Street View URL</label><input type="url" id="f-streetview" placeholder="Google Maps Street View link"></div>

      <button class="btn btn-danger" id="del-btn" style="display:none;flex:0 0 auto;padding:14px 18px" onclick="deleteProperty()">🗑</button>
      <button class="btn" onclick="closeEditModal()" style="flex:0 0 auto;padding:14px 20px">Ακύρωση</button>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Ακίνητο</div>
      <button class="modal-close" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body" id="view-modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeViewModal()">Κλείσιμο</button>
      <button class="btn btn-primary" id="view-edit-btn">✏ Επεξεργασία</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let properties=[];
let markers={};
let selectedStatus=0;
let editingId=null;
let editPhotos=[];
let pendingLatLng=null;
let map;
let locatorPin=null;

const SL=['Υπό Εξέταση','Ενδιαφέρον','Απορρίφθηκε','Πουλήθηκε'];
const SC=['s0','s1','s2','s3'];

// SYNC DOT
function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  if(d) d.className='sync-dot '+s;
}
window._setSyncStatus=setSyncStatus;

// MAP
function initMap(){
  map=L.map('map',{zoomControl:true,center:[40.6401,22.9444],zoom:14,tap:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(map);
  map.on('click',function(e){pendingLatLng=e.latlng;openAddModal(e.latlng);});
  window._map=map;
  window._mapReady=true;
  setSyncStatus('syncing');
  if(window._pendingSnapshot) window._applySnapshot(window._pendingSnapshot);
}

window._applySnapshot = function(data){
  properties=data;
  Object.keys(markers).forEach(id=>{if(markers[id])map.removeLayer(markers[id]);});
  markers={};
  properties.forEach(p=>addMarker(p));
  renderList();
  setSyncStatus('synced');
}

window._setSyncStatus = setSyncStatus;

function pinIcon(status){
  const c=['#4f7cff','#2eb87a','#e05252','#ca9d00'][status]||'#4f7cff';
  return L.divIcon({
    className:'',
    html:`<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${c};border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)">
      <div style="transform:rotate(45deg);text-align:center;line-height:20px;font-size:10px">🏠</div></div>`,
    iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-28]
  });
}
function addMarker(p){
  const m=L.marker([p.lat,p.lng],{icon:pinIcon(p.status||0)}).addTo(map);
  m.on('click',()=>showViewModal(p.id));
  markers[p.id]=m;
}
function removeMarker(id){if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}}
function updateMarker(p){removeMarker(p.id);addMarker(p);}

// FIREBASE SAVE/DELETE
async function fbSave(prop){
  setSyncStatus('syncing');
  try{
    await window._fbSave(prop);
    setSyncStatus('synced');
  }catch(e){console.error(e);setSyncStatus('error');showToast('Σφάλμα αποθήκευσης');}
}
async function fbDelete(id){
  setSyncStatus('syncing');
  try{
    await window._fbDelete(id);
    setSyncStatus('synced');
  }catch(e){console.error(e);setSyncStatus('error');showToast('Σφάλμα διαγραφής');}
}

// NAV
function showNav(tab){
  ['map','list','filters'].forEach(t=>{
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
    if(t!=='map'){
      const p=document.getElementById('panel-'+t);
      if(p) p.classList.toggle('open',t===tab);
    }
  });
  document.getElementById('nav-export').classList.remove('active');
}
function closePanel(tab){
  document.getElementById('panel-'+tab).classList.remove('open');
  document.getElementById('nav-'+tab).classList.remove('active');
  document.getElementById('nav-map').classList.add('active');
}

// SEARCH
let searchTimeout;
function clearSearch(){
  document.getElementById('addr-search').value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('search-clear').style.display='none';
  if(locatorPin){map.removeLayer(locatorPin);locatorPin=null;}
}
document.getElementById('addr-search').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  const q=this.value.trim();
  document.getElementById('search-clear').style.display=q?'block':'none';
  if(q.length<2){document.getElementById('search-results').style.display='none';return;}
  searchTimeout=setTimeout(()=>doSearch(q),350);
});
document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap')) document.getElementById('search-results').style.display='none';
});
async function doSearch(q){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+' Θεσσαλονίκη')}&limit=6&accept-language=el`);
    const data=await res.json();
    const box=document.getElementById('search-results');
    box.innerHTML='';
    if(!data.length){box.style.display='none';return;}
    data.forEach(r=>{
      const parts=r.display_name.split(',');
      const primary=parts.slice(0,2).join(',').trim();
      const secondary=parts.slice(2,4).join(',').trim();
      const item=document.createElement('div');
      item.className='sr-item';
      item.innerHTML=`<span class="sr-icon">📍</span><div><div class="sr-name">${primary}</div>${secondary?`<div class="sr-sub">${secondary}</div>`:''}</div>`;
      item.addEventListener('click',()=>{
        const lat=parseFloat(r.lat),lng=parseFloat(r.lon);
        map.setView([lat,lng],17);
        document.getElementById('addr-search').value=primary;
        document.getElementById('search-clear').style.display='block';
        box.style.display='none';
        if(locatorPin)map.removeLayer(locatorPin);
        const ri=L.divIcon({className:'',html:`<div style="display:flex;flex-direction:column;align-items:center"><div style="width:20px;height:20px;background:#e05252;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)"></div><div style="width:3px;height:12px;background:#e05252;border-radius:0 0 2px 2px;margin-top:-1px"></div></div>`,iconSize:[20,32],iconAnchor:[10,32],popupAnchor:[0,-34]});
        locatorPin=L.marker([lat,lng],{icon:ri}).addTo(map);
        locatorPin.bindPopup(`<b>${primary}</b>`).openPopup();
      });
      box.appendChild(item);
    });
    box.style.display='block';
  }catch(e){}
}
async function geocodeAddr(addr){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
    const d=await res.json();
    if(d.length)return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}
async function reverseGeocode(lat,lng){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=el`);
    const d=await res.json();
    return d.display_name||'';
  }catch(e){return '';}
}

// ADD/EDIT MODAL
function openAddModal(latlng){
  editingId=null;editPhotos=[];
  document.getElementById('modal-title-text').textContent='Νέο Ακίνητο';
  document.getElementById('del-btn').style.display='none';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  ['f-address','f-price','f-sqm','f-floor-inp','f-phone','f-notes','f-streetview'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-elev').value='';
  document.getElementById('f-owner').value='';
  document.getElementById('photo-preview').innerHTML='';
  selectStatus(0);
  if(latlng) reverseGeocode(latlng.lat,latlng.lng).then(a=>{document.getElementById('f-address').value=a;});
  document.getElementById('edit-modal').classList.add('open');
}
function openEditModal(id){
  const p=properties.find(x=>x.id===id);if(!p)return;
  editingId=id;editPhotos=[...(p.photos||[])];
  document.getElementById('modal-title-text').textContent='Επεξεργασία';
  document.getElementById('del-btn').style.display='flex';
  document.getElementById('f-date').value=p.date||'';
  document.getElementById('f-address').value=p.address||'';
  document.getElementById('f-price').value=p.price||'';
  document.getElementById('f-sqm').value=p.sqm||'';
  document.getElementById('f-floor-inp').value=p.floor||'';
  document.getElementById('f-elev').value=p.elevator||'';
  document.getElementById('f-owner').value=p.owner||'';
  document.getElementById('f-phone').value=p.phone||'';
  document.getElementById('f-notes').value=p.notes||'';
  document.getElementById('f-streetview').value=p.streetview||'';
  selectStatus(p.status||0);
  renderPhotoPreviews();
  closeViewModal();
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(){document.getElementById('edit-modal').classList.remove('open');pendingLatLng=null;}
function selectStatus(n){
  selectedStatus=n;
  [0,1,2,3].forEach(i=>{
    const el=document.getElementById('s-opt-'+i);
    el.className='sopt'+(i===n?' sel'+i:'');
  });
}

// PHOTOS
function handlePhotos(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{editPhotos.push(ev.target.result);renderPhotoPreviews();}
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function renderPhotoPreviews(){
  const w=document.getElementById('photo-preview');w.innerHTML='';
  editPhotos.forEach((src,i)=>{
    const d=document.createElement('div');d.className='photo-prev';
    d.innerHTML=`<img src="${src}"><button class="photo-del" onclick="removePhoto(${i})">✕</button>`;
    w.appendChild(d);
  });
}
function removePhoto(i){editPhotos.splice(i,1);renderPhotoPreviews();}

// SAVE / DELETE
async function saveProperty(){
  const addr=document.getElementById('f-address').value.trim();
  if(!addr){showToast('Παρακαλώ εισάγετε διεύθυνση');return;}
  const id=editingId||('p'+Date.now());
  const ll=pendingLatLng||{lat:40.6401,lng:22.9444};
  const prop={
    id,
    lat: editingId ? (properties.find(x=>x.id===editingId)?.lat||ll.lat) : ll.lat,
    lng: editingId ? (properties.find(x=>x.id===editingId)?.lng||ll.lng) : ll.lng,
    date:document.getElementById('f-date').value,
    address:addr,
    price:document.getElementById('f-price').value,
    sqm:document.getElementById('f-sqm').value,
    floor:document.getElementById('f-floor-inp').value,
    elevator:document.getElementById('f-elev').value,
    owner:document.getElementById('f-owner').value,
    phone:document.getElementById('f-phone').value,
    notes:document.getElementById('f-notes').value,
    streetview:document.getElementById('f-streetview').value,
    status:selectedStatus,
    photos:[...editPhotos]
  };
  if(!editingId && !pendingLatLng){
    const ll2=await geocodeAddr(addr);
    if(ll2){prop.lat=ll2.lat;prop.lng=ll2.lng;}
  }
  closeEditModal();
  showToast(editingId?'Αποθήκευση...':'Προσθήκη...');
  await fbSave(prop);
}
async function deleteProperty(){
  if(!editingId)return;
  if(!confirm('Διαγραφή;'))return;
  const id=editingId;
  closeEditModal();
  await fbDelete(id);
}

// VIEW MODAL
function showViewModal(id){
  const p=properties.find(x=>x.id===id);if(!p)return;
  let photos='';
  if(p.photos&&p.photos.length){
    photos=`<div style="margin-bottom:12px"><div class="view-section-title">Φωτογραφίες</div>
    <div class="gallery">${p.photos.map((s,i)=>`<img src="${s}" onclick="openLightbox('${p.id}',${i})">`).join('')}</div></div>`;
  }
  document.getElementById('view-modal-body').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
      <div style="font-size:15px;font-weight:700;color:var(--text);flex:1">${p.address||'—'}</div>
      <span class="status-badge ${SC[p.status||0]}">${SL[p.status||0]}</span>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">📅 ${p.date||'—'}</div>
    ${p.price?`<div class="view-price">€${Number(p.price).toLocaleString('el-GR')}</div>`:''}
    <div class="view-info-grid">
      <div class="view-info-item"><div class="view-info-label">Τ.μ.</div><div class="view-info-val">${p.sqm?p.sqm+' τ.μ.':'—'}</div></div>
      <div class="view-info-item"><div class="view-info-label">Όροφος</div><div class="view-info-val">${p.floor||'—'}</div></div>
      <div class="view-info-item"><div class="view-info-label">Ασανσέρ</div><div class="view-info-val">${p.elevator||'—'}</div></div>
      <div class="view-info-item"><div class="view-info-label">Τύπος</div><div class="view-info-val">${p.owner||'—'}</div></div>
      ${p.phone?`<div class="view-info-item" style="grid-column:1/-1"><div class="view-info-label">Τηλέφωνο</div><div class="view-info-val"><a href="tel:${p.phone}" style="color:var(--accent)">${p.phone}</a></div></div>`:''}
    </div>
    ${p.notes?`<div style="margin-bottom:12px"><div class="view-section-title">Σημειώσεις</div><div class="view-notes">${p.notes}</div></div>`:''}
    ${p.streetview?`<a href="${p.streetview}" target="_blank" class="btn" style="margin-bottom:12px;text-decoration:none;display:flex">🌍 Street View</a>`:''}
    ${photos}
    ${p.sqm&&p.price?`<div style="font-size:12px;color:var(--text3);margin-top:4px">Τιμή/τ.μ.: <strong style="color:var(--text2)">€${Math.round(p.price/p.sqm).toLocaleString('el-GR')}</strong></div>`:''}
  `;
  document.getElementById('view-edit-btn').onclick=()=>openEditModal(id);
  document.getElementById('view-modal').classList.add('open');
  if(markers[id])map.setView([p.lat,p.lng],17);
}
function closeViewModal(){document.getElementById('view-modal').classList.remove('open');}

// LIGHTBOX
function openLightbox(pid,idx){
  const p=properties.find(x=>x.id===pid);
  if(!p||!p.photos[idx])return;
  document.getElementById('lb-img').src=p.photos[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// LIST & FILTERS
function getFiltered(){
  let list=[...properties];
  const fs=document.getElementById('f-status')?.value;
  const fe=document.getElementById('f-elevator')?.value?.toLowerCase();
  const ft=document.getElementById('f-type')?.value?.toLowerCase();
  const ff=document.getElementById('f-floor')?.value;
  const fpMin=document.getElementById('f-price-min')?.value;
  const fpMax=document.getElementById('f-price-max')?.value;
  const fsMin=document.getElementById('f-sqm-min')?.value;
  const fsMax=document.getElementById('f-sqm-max')?.value;
  const sort=document.getElementById('f-sort')?.value||'date-desc';
  if(fs!=='')list=list.filter(p=>String(p.status||0)===fs);
  if(fe)list=list.filter(p=>(p.elevator||'').toLowerCase().includes(fe));
  if(ft)list=list.filter(p=>(p.owner||'').toLowerCase().includes(ft));
  if(ff)list=list.filter(p=>String(p.floor)===ff);
  if(fpMin)list=list.filter(p=>Number(p.price)>=Number(fpMin));
  if(fpMax)list=list.filter(p=>Number(p.price)<=Number(fpMax));
  if(fsMin)list=list.filter(p=>Number(p.sqm)>=Number(fsMin));
  if(fsMax)list=list.filter(p=>Number(p.sqm)<=Number(fsMax));
  list.sort((a,b)=>{
    if(sort==='date-desc')return(b.date||'')>(a.date||'')?1:-1;
    if(sort==='date-asc')return(a.date||'')>(b.date||'')?1:-1;
    if(sort==='price-asc')return Number(a.price||0)-Number(b.price||0);
    if(sort==='price-desc')return Number(b.price||0)-Number(a.price||0);
    if(sort==='sqm-asc')return Number(a.sqm||0)-Number(b.sqm||0);
    if(sort==='sqm-desc')return Number(b.sqm||0)-Number(a.sqm||0);
    return 0;
  });
  return list;
}
function applyFilters(){renderList();}
function clearFilters(){
  ['f-status','f-elevator','f-type'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['f-floor','f-price-min','f-price-max','f-sqm-min','f-sqm-max'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-sort').value='date-desc';
  renderList();
}
function renderList(){
  const list=getFiltered();
  const cont=document.getElementById('props-list');
  cont.innerHTML='';
  if(!properties.length){
    cont.innerHTML='<div class="empty">🏠<br><br>Δεν υπάρχουν ακίνητα.<br>Πατήστε + ή αγγίξτε τον χάρτη.</div>';
  } else {
    list.forEach(p=>{
      const d=document.createElement('div');d.className='prop-card';
      const thumbs=p.photos&&p.photos.length?`<div class="prop-thumbs">${p.photos.slice(0,3).map(s=>`<img src="${s}">`).join('')}</div>`:'';
      d.innerHTML=`
        <div class="prop-card-header">
          <div class="prop-addr">${p.address||'Χωρίς διεύθυνση'}</div>
          <span class="status-badge ${SC[p.status||0]}">${SL[p.status||0]}</span>
        </div>
        <div class="prop-meta">
          ${p.sqm?`<span class="meta-i">📐 <span class="meta-v">${p.sqm}τ.μ.</span></span>`:''}
          ${p.floor?`<span class="meta-i">🏢 <span class="meta-v">${p.floor}ος</span></span>`:''}
          ${p.elevator?`<span class="meta-i">🛗 <span class="meta-v">${p.elevator}</span></span>`:''}
          ${p.owner?`<span class="meta-i">👤 <span class="meta-v">${p.owner}</span></span>`:''}
        </div>
        ${p.price?`<div class="prop-price">€${Number(p.price).toLocaleString('el-GR')}</div>`:''}
        ${thumbs}`;
      d.onclick=()=>{showViewModal(p.id);closePanel('list');};
      cont.appendChild(d);
    });
  }
  const prices=properties.filter(p=>p.price).map(p=>Number(p.price));
  const sqms=properties.filter(p=>p.sqm).map(p=>Number(p.sqm));
  document.getElementById('s-total').textContent=properties.length;
  document.getElementById('s-avg-price').textContent=prices.length?'€'+Math.round(prices.reduce((a,b)=>a+b,0)/prices.length).toLocaleString('el-GR'):'—';
  document.getElementById('s-avg-sqm').textContent=sqms.length?Math.round(sqms.reduce((a,b)=>a+b,0)/sqms.length)+'τ.μ.':'—';
  setSyncStatus('synced');
}

// LOCATE
function locateMe(){map.locate({setView:true,maxZoom:16});}

// EXPORT
function exportExcel(){
  if(!properties.length){showToast('Δεν υπάρχουν ακίνητα');return;}
  try{
    const rows=properties.map(p=>({'Ημερομηνία':p.date||'','Διεύθυνση':p.address||'','Τιμή':p.price||'','Τ.μ.':p.sqm||'','Όροφος':p.floor||'','Ασανσέρ':p.elevator||'','Τύπος':p.owner||'','Τηλέφωνο':p.phone||'','Κατάσταση':SL[p.status||0],'Σημειώσεις':p.notes||'','Street View':p.streetview||''}));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Ακίνητα');
    XLSX.writeFile(wb,'the-new-yorkers.xlsx');
    showToast('Export ✓');
  }catch(e){showToast('Export μόνο σε υπολογιστή');}
}

// TOAST
function showToast(msg){
  if(!msg)return;
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
